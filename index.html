<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ValueScan — Instant SEO, SEM, marketing, security and technical audits for any website. Run 50+ checks in seconds." />
    <meta name="theme-color" content="#6366f1" />
    <title>ValueScan — Automated Website Audits</title>

    <!-- Canonical -->
    <link rel="canonical" href="https://valuescan.online/" />

    <!-- Open Graph -->
    <meta property="og:title" content="ValueScan — Automated Website Audits" />
    <meta property="og:description" content="Instant SEO, SEM, security & performance audits. Run 50+ checks in seconds." />
    <meta property="og:image" content="https://valuescan.online/og-image.png" />
    <meta property="og:url" content="https://valuescan.online/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ValueScan" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ValueScan — Automated Website Audits" />
    <meta name="twitter:description" content="Instant SEO, SEM, security & performance audits. Run 50+ checks in seconds." />
    <meta name="twitter:image" content="https://valuescan.online/og-image.png" />

    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "ValueScan",
          "url": "https://valuescan.online/",
          "logo": "https://valuescan.online/favicon.svg",
          "sameAs": [
            "https://twitter.com/ValueScanHQ"
          ]
        },
        {
          "@type": "WebSite",
          "name": "ValueScan",
          "url": "https://valuescan.online/",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://valuescan.online/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "ValueScan",
          "applicationCategory": "WebApplication",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "GBP"
          },
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.8",
            "ratingCount": "120"
          }
        }
      ]
    }
    </script>

    <!-- Google Analytics 4 (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      const gaId = '%VITE_GA_MEASUREMENT_ID%';
      if (gaId) gtag('config', gaId);
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
