# Printable Listings marketplace — https://printablelistings.xyz
# Do NOT point this domain at Umami. Use stats.printablelistings.xyz for analytics.
#
# Install:
#   cp deploy/nginx-printablelistings.xyz.conf /etc/nginx/sites-available/printablelistings.xyz
#   ln -sf /etc/nginx/sites-available/printablelistings.xyz /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

upstream printablelistings_app {
    server 127.0.0.1:4020;
    keepalive 8;
}

map $http_x_forwarded_proto $redirect_to_https {
    default 1;
    https   0;
    http    1;
    ""      1;
}

server {
    listen 80;
    listen [::]:80;
    server_name printablelistings.xyz www.printablelistings.xyz;

    location / {
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://printablelistings_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name printablelistings.xyz www.printablelistings.xyz;

    ssl_certificate /etc/letsencrypt/live/printablelistings.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/printablelistings.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://printablelistings_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
