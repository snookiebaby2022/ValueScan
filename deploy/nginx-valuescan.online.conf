# ValueScan — https://valuescan.online
# Proxies all traffic to Node on port 4030 (API + SPA).
#
# Install (on VPS):
#   cp deploy/nginx-valuescan.online.conf /etc/nginx/sites-available/valuescan.online
#   ln -sf /etc/nginx/sites-available/valuescan.online /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d valuescan.online -d www.valuescan.online

upstream valuescan_app {
    server 127.0.0.1:4030;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name valuescan.online www.valuescan.online;

    location / {
        proxy_pass http://valuescan_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name valuescan.online www.valuescan.online;

    ssl_certificate /etc/letsencrypt/live/valuescan.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/valuescan.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://valuescan_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
}
