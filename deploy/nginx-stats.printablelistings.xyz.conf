# Umami analytics dashboard — https://stats.printablelistings.xyz
# Keep Umami OFF the apex domain (printablelistings.xyz = marketplace only).
#
# Install:
#   cp deploy/nginx-stats.printablelistings.xyz.conf /etc/nginx/sites-available/stats.printablelistings.xyz
#   ln -sf /etc/nginx/sites-available/stats.printablelistings.xyz /etc/nginx/sites-enabled/
#   certbot --nginx -d stats.printablelistings.xyz
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name stats.printablelistings.xyz;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stats.printablelistings.xyz;

    ssl_certificate /etc/letsencrypt/live/stats.printablelistings.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stats.printablelistings.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
